<!DOCTYPE html>
<html lang="pt">
<head>
    <title>EletroSync - Meus Favoritos</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/vendor.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .transition-hover {
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 16px;
            background: #fff;
            border: 1px solid #f2f2f2;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03) !important;
        }

        .transition-hover:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1) !important;
            border-color: #ffc43f;
        }

        /* Imagem com zoom e rotação orgânica */
        .product-image {
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            height: 180px;
            object-fit: contain;
        }

        .transition-hover:hover .product-image {
            transform: scale(1.1) rotate(2deg);
        }

        /* Estrela com o teu Gradiente Dourado */
        .premium-star {
            font-size: 0.9rem;
            background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
        }

        .transition-hover:hover .premium-star {
            transform: scale(1.2);
        }

        /* Título que muda de cor */
        .product-title {
            font-weight: 700;
            transition: color 0.3s ease;
            color: #2d2d2d;
        }

        .transition-hover:hover .product-title {
            color: #ffc43f !important;
        }

        /* Ajuste dos botões dentro do card */
        .card-actions {
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }
        
        .transition-hover:hover .card-actions {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-light">

    <header class="py-3 border-bottom bg-white">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html"><img src="images/logo3.png" style="max-height: 40px;"></a>
            <a href="index.html" class="btn btn-outline-primary rounded-5">Voltar à Loja</a>
        </div>
    </header>

    <div class="container py-5">
        <h2 class="fw-bold mb-4"><i class="fa-solid fa-heart text-danger me-2"></i>Meus Favoritos</h2>
        
        <div id="favList" class="row g-4">
            </div>

        <div id="emptyMsg" class="text-center py-5 d-none">
            <i class="fa-regular fa-heart fa-4x text-muted mb-3"></i>
            <h3>A tua lista está vazia</h3>
            <p>Explora os produtos e clica no coração para os guardares aqui!</p>
            <a href="index.html" class="btn btn-primary rounded-5 px-4 mt-3">Explorar Produtos</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const favList = document.getElementById('favList');
            const emptyMsg = document.getElementById('emptyMsg');
            
            // Carregar favoritos do localStorage
            let favorites = JSON.parse(localStorage.getItem('myFavorites')) || [];

            if (favorites.length === 0) {
                emptyMsg.classList.remove('d-none');
                return;
            }

            favList.innerHTML = favorites.map(product => {
                // 1. Lógica para garantir que pegamos o preço mais baixo, mesmo que não esteja ordenado
                const prices = product.shops.map(s => parseFloat(s.price));
                const minPrice = Math.min(...prices);

                return `
                    <div class="col-md-6 col-lg-4">
                        <div class="transition-hover p-4">
                            <div class="mb-2">
                                <span class="badge" style="font-size: 10px;">${product.category}</span>
                            </div>

                            <div class="text-center py-3">
                                <img src="${product.image}" class="product-image img-fluid" alt="${product.name}">
                            </div>

                            <div class="product-content mt-3">
                                <div class="d-flex align-items-center gap-1 mb-1">
                                    <i class="fa-solid fa-star premium-star"></i>
                                    <span class="small fw-bold">${product.rating}</span>
                                </div>
                                
                                <h5 class="product-title mb-3">${product.name}</h5>
                                
                                <div class="d-flex justify-content-between align-items-end mt-auto">
                                    <div>
                                        <span class="text-muted d-block" style="font-size: 11px;">O preço mais baixo</span>
                                        <span class="fw-bold text-dark fs-4">${minPrice.toFixed(2)}€</span>
                                    </div>
                                    
                                    <div class="card-actions">
                                        <button class="btn btn-outline-danger btn-sm rounded-circle me-1" onclick="removeFav('${product.name}')" title="Remover">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                        <button class="btn btn-dark btn-sm rounded-5 px-3" onclick="viewProduct('${product.name}')">
                                            Ver Lojas
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        });

        // Função para remover um favorito
        function removeFav(name) {
            let favorites = JSON.parse(localStorage.getItem('myFavorites')) || [];
            favorites = favorites.filter(p => p.name !== name);
            localStorage.setItem('myFavorites', JSON.stringify(favorites));
            location.reload(); // Recarrega para atualizar a lista
        }

        // Função para ir para a página do produto
        function viewProduct(name) {
            let favorites = JSON.parse(localStorage.getItem('myFavorites')) || [];
            const prod = favorites.find(p => p.name === name);
            localStorage.setItem('selectedProduct', JSON.stringify(prod));
            window.location.href = 'single-product.html';
        }
    </script>
</body>
</html>
