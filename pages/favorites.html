<!DOCTYPE html>
<html lang="pt">
<head>
    <title>Meus Favoritos — EletroSync</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/design-system.css">

    <style>
        .page-header {
            background: var(--es-white);
            padding: 32px 0;
            border-bottom: 1px solid var(--es-gray-200);
        }
        .page-header h1 { margin: 0; display: flex; align-items: center; gap: 12px; }
        .page-header h1 i { color: var(--es-danger); }
        .page-header p { color: var(--es-text-muted); margin: 4px 0 0; }

        /* Product card reusing es-product-card */
        .fav-card { position: relative; }
        .fav-card .fav-remove {
            position: absolute;
            top: 12px; right: 12px;
            width: 36px; height: 36px;
            background: var(--es-white);
            color: var(--es-danger);
            border: 0;
            border-radius: var(--es-radius-full);
            box-shadow: var(--es-shadow-sm);
            cursor: pointer;
            transition: all var(--es-transition);
            z-index: 2;
        }
        .fav-card .fav-remove:hover { background: var(--es-danger); color: var(--es-white); }
    </style>
</head>
<body>

<div id="es-header-slot"></div>

<div class="page-header">
    <div class="container">
        <h1><i class="fa-solid fa-heart"></i> Meus Favoritos</h1>
        <p>Os produtos que guardaste para comparar mais tarde</p>
    </div>
</div>

<main class="es-section">
    <div class="container">
        <div id="favList" class="row g-3"></div>

        <div id="emptyMsg" class="es-empty d-none">
            <div class="es-empty-icon">
                <i class="fa-regular fa-heart"></i>
            </div>
            <h4>A tua lista está vazia</h4>
            <p>Explora os produtos e clica no coração para os guardares aqui.</p>
            <a href="product.html" class="es-btn es-btn-primary es-btn-lg mt-3">
                <i class="fa-solid fa-compass"></i> Explorar Produtos
            </a>
        </div>
    </div>
</main>

<div id="es-footer-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/ui-layout.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/favorites.js"></script>
<script>
    let cachedFavorites = [];

    const CATEGORY_LABEL = {
        'eletrodomesticos': 'Eletrodomésticos',
        'informatica':      'Informática',
        'smartphones':      'Smartphones',
        'imagem-e-som':     'Imagem e Som',
        'gaming':           'Gaming',
        'outros':           'Outros',
    };

    function escHtml(str) {
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function renderFavorites() {
        const favList = document.getElementById('favList');
        const emptyMsg = document.getElementById('emptyMsg');

        cachedFavorites = await window.Favorites.getFavorites();

        if (cachedFavorites.length === 0) {
            favList.innerHTML = '';
            emptyMsg.classList.remove('d-none');
            return;
        }
        emptyMsg.classList.add('d-none');

        favList.innerHTML = cachedFavorites.map(product => {
            const prices = (product.shops || []).map(s => parseFloat(s.price)).filter(n => !isNaN(n));
            const minPrice = prices.length ? Math.min(...prices) : 0;
            const catLabel = CATEGORY_LABEL[product.category] || '';

            return `
                <div class="col-6 col-md-4 col-lg-3">
                    <div class="es-product-card fav-card">
                        <button class="fav-remove" onclick="removeFav('${encodeURIComponent(product.name)}')" title="Remover dos favoritos">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        <div class="es-product-image">
                            <img src="${escHtml(product.image)}" alt="${escHtml(product.name)}" loading="lazy">
                        </div>
                        <div class="es-product-body">
                            ${catLabel ? `<span class="es-badge es-badge-neutral" style="align-self:flex-start;">${catLabel}</span>` : ''}
                            <h3 class="es-product-title">${escHtml(product.name)}</h3>
                            <span class="es-product-rating">
                                <i class="fa-solid fa-star"></i> ${escHtml(product.rating || '—')}
                            </span>
                            <div class="es-product-price-row">
                                <div>
                                    <div style="font-size:.7rem;color:var(--es-text-muted);text-transform:uppercase;font-weight:700;letter-spacing:.04em;">Desde</div>
                                    <span class="es-product-price">${minPrice.toFixed(2)}€</span>
                                </div>
                            </div>
                        </div>
                        <div class="es-product-actions">
                            <button class="es-btn es-btn-primary es-btn-sm flex-grow-1" onclick="viewProduct('${encodeURIComponent(product.name)}')">
                                Ver Lojas <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function removeFav(encodedName) {
        const name = decodeURIComponent(encodedName);
        await window.Favorites.removeFavorite(name);
        await renderFavorites();
    }

    function viewProduct(encodedName) {
        const name = decodeURIComponent(encodedName);
        const prod = cachedFavorites.find(p => p.name === name);
        if (!prod) return;
        localStorage.setItem('selectedProduct', JSON.stringify(prod));
        window.location.href = 'single-product.html';
    }

    document.addEventListener('DOMContentLoaded', renderFavorites);
</script>
</body>
</html>
