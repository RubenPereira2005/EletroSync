<!DOCTYPE html>
<html lang="pt">
<head>
    <title>EletroSync - Detalhes do Produto</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/vendor.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        .product-detail-container { margin-top: 50px; margin-bottom: 80px; }
        .comparison-card { border-radius: 15px; border: 1px solid #eee; transition: all 0.3s ease; }
        .comparison-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .premium-star { color: #FFC107; }
        .store-logo-name { font-size: 1.2rem; font-weight: 700; color: #222; }
    </style>
</head>
<body>

    <!-- SVGs partilhados (ícones usados por cart.js e outros) -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <symbol id="cart" viewBox="0 0 24 24">
                <path fill="currentColor" d="M8.5 19a1.5 1.5 0 1 0 1.5 1.5A1.5 1.5 0 0 0 8.5 19ZM19 16H7a1 1 0 0 1 0-2h8.491a3.013 3.013 0 0 0 2.885-2.176l1.585-5.55A1 1 0 0 0 19 5H6.74a3.007 3.007 0 0 0-2.82-2H3a1 1 0 0 0 0 2h.921a1.005 1.005 0 0 1 .962.725l.155.545v.005l1.641 5.742A3 3 0 0 0 7 18h12a1 1 0 0 0 0-2Zm-1.326-9l-1.22 4.274a1.005 1.005 0 0 1-.963.726H8.754l-.255-.892L7.326 7ZM16.5 19a1.5 1.5 0 1 0 1.5 1.5a1.5 1.5 0 0 0-1.5-1.5Z"/>
            </symbol>
        </defs>
    </svg>

    <header class="py-3 border-bottom bg-white">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-6 col-lg-3">
                    <div class="main-logo">
                        <a href="index.html">
                            <img src="images/logo3.png" alt="logo" class="img-fluid" style="max-height: 50px;">
                        </a>
                    </div>
                </div>
                <div class="col-6 col-lg-9 text-end">
                    <a href="index.html" class="btn btn-outline-primary rounded-5 px-4 me-2">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar ao Catálogo
                    </a>
                    <button type="button" class="btn btn-outline-dark rounded-circle position-relative p-2"
                            data-bs-toggle="offcanvas" data-bs-target="#offcanvasCart"
                            aria-controls="offcanvasCart" title="Carrinho">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="product-detail-container">
        <div class="container">
            <div class="row g-5">
                <div class="col-md-5">
                    <div class="bg-white p-5 rounded-4 border text-center">
                        <img id="mainImage" src="" class="img-fluid" style="max-height: 400px; object-fit: contain;">
                    </div>
                </div>

                <div class="col-md-7">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                          <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                          <li id="breadcrumbCat" class="breadcrumb-item active"></li>
                        </ol>
                    </nav>

                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h1 id="prodTitle" class="display-6 fw-bold m-0"></h1>
                        <div class="d-flex gap-2">
                            <button id="addToCartBtn" class="btn btn-primary rounded-5 px-4 shadow-sm" title="Adicionar ao Carrinho">
                                <i class="fa-solid fa-cart-plus me-2"></i>Adicionar ao Carrinho
                            </button>
                            <button id="favBtn" class="btn btn-outline-danger rounded-circle p-3 shadow-sm border-0" title="Adicionar aos Favoritos">
                                <i class="fa-regular fa-heart fs-4"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <div class="stars">
                            <i class="fa-solid fa-star premium-star"></i>
                        </div>
                        <span id="prodRating" class="fw-bold fs-5"></span>
                        <span class="text-muted">(Baseado em avaliações de utilizadores)</span>
                    </div>

                    <div class="comparison-section mt-5">
                        <h4 class="fw-bold mb-4">Melhores Preços Disponíveis</h4>
                        
                        <div class="table-responsive rounded-4 border bg-white shadow-sm">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4 py-3">Loja</th>
                                        <th class="py-3">Disponibilidade</th>
                                        <th class="py-3">Preço</th>
                                        <th class="pe-4 py-3 text-end">Ação</th>
                                    </tr>
                                </thead>
                                <tbody id="shopsComparison">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Offcanvas do carrinho (conteúdo é preenchido dinamicamente por cart.js) -->
    <div class="offcanvas offcanvas-end" data-bs-scroll="true" tabindex="-1" id="offcanvasCart" aria-labelledby="My Cart">
        <div class="offcanvas-header justify-content-center">
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/single-product.js"></script>
</body>
</html>
