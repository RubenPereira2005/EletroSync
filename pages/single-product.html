<!DOCTYPE html>
<html lang="pt">
<head>
    <title>EletroSync - Detalhes do Produto</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/vendor.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        .product-detail-container { margin-top: 50px; margin-bottom: 80px; }
        .comparison-card { border-radius: 15px; border: 1px solid #eee; transition: all 0.3s ease; }
        .comparison-card:hover { box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .premium-star { color: #FFC107; }
        .store-logo-name { font-size: 1.2rem; font-weight: 700; color: #222; }
    </style>
</head>
<body>

    <header class="py-3 border-bottom bg-white">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-6 col-lg-3">
                    <div class="main-logo">
                        <a href="index.html">
                            <img src="images/logo3.png" alt="logo" class="img-fluid" style="max-height: 50px;">
                        </a>
                    </div>
                </div>
                <div class="col-6 col-lg-9 text-end">
                    <a href="index.html" class="btn btn-outline-primary rounded-5 px-4">
                        <i class="fa-solid fa-arrow-left me-2"></i>Voltar ao Catálogo
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="product-detail-container">
        <div class="container">
            <div class="row g-5">
                <div class="col-md-5">
                    <div class="bg-white p-5 rounded-4 border text-center">
                        <img id="mainImage" src="" class="img-fluid" style="max-height: 400px; object-fit: contain;">
                    </div>
                </div>

                <div class="col-md-7">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                          <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Home</a></li>
                          <li id="breadcrumbCat" class="breadcrumb-item active"></li>
                        </ol>
                    </nav>

                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h1 id="prodTitle" class="display-6 fw-bold m-0"></h1>
                        <button id="favBtn" class="btn btn-outline-danger rounded-circle p-3 shadow-sm border-0" title="Adicionar aos Favoritos">
                            <i class="fa-regular fa-heart fs-4"></i>
                        </button>
                    </div>
                    
                    <div class="d-flex align-items-center gap-2 mb-4">
                        <div class="stars">
                            <i class="fa-solid fa-star premium-star"></i>
                        </div>
                        <span id="prodRating" class="fw-bold fs-5"></span>
                        <span class="text-muted">(Baseado em avaliações de utilizadores)</span>
                    </div>

                    <div class="comparison-section mt-5">
                        <h4 class="fw-bold mb-4">Melhores Preços Disponíveis</h4>
                        
                        <div class="table-responsive rounded-4 border bg-white shadow-sm">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4 py-3">Loja</th>
                                        <th class="py-3">Disponibilidade</th>
                                        <th class="py-3">Preço</th>
                                        <th class="pe-4 py-3 text-end">Ação</th>
                                    </tr>
                                </thead>
                                <tbody id="shopsComparison">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/single-product.js"></script>
</body>
</html>
