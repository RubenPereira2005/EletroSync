<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <title>A redirecionar… — EletroSync</title>
    <meta http-equiv="refresh" content="0; url=single-product.html">
    <script>
        // Preserva o parâmetro ?id= se existir (para compatibilidade com URLs antigos)
        (function () {
            const params = new URLSearchParams(window.location.search);
            const target = params.toString() ? `single-product.html?${params.toString()}` : 'single-product.html';
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p>A redirecionar… <a href="single-product.html">Clica aqui se não fores redirecionado</a>.</p>
</body>
</html>
