<!DOCTYPE html>
<html lang="pt">
<head>
    <title>Produtos — EletroSync</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explora milhares de produtos de eletrónica e compara preços em tempo real.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/design-system.css">

    <style>
        .page-header {
            background: var(--es-white);
            padding: 32px 0;
            border-bottom: 1px solid var(--es-gray-200);
        }
        .page-header h1 { margin: 0 0 4px; font-size: 1.75rem; }
        .page-header p { color: var(--es-text-muted); margin: 0; }

        /* Filters */
        .filter-sidebar {
            background: var(--es-white);
            border: 1px solid var(--es-gray-200);
            border-radius: var(--es-radius-lg);
            padding: 20px;
            position: sticky;
            top: 120px;
        }
        .filter-sidebar h3 {
            font-size: 1rem;
            margin: 0 0 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--es-gray-200);
            display: flex; justify-content: space-between; align-items: center;
        }
        .filter-group { margin-bottom: 20px; }
        .filter-group-title {
            font-size: 0.8125rem;
            font-weight: 700;
            color: var(--es-gray-700);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin: 0 0 12px;
        }
        .filter-option {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 0;
            font-size: 0.875rem;
            color: var(--es-text);
            cursor: pointer;
            user-select: none;
        }
        .filter-option input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--es-primary);
            cursor: pointer;
        }
        .filter-range-labels {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: var(--es-text-muted);
            margin-top: 4px;
        }
        .form-range { accent-color: var(--es-primary); }

        /* Category tabs */
        .category-tabs {
            display: flex; gap: 6px;
            background: var(--es-white);
            padding: 6px;
            border-radius: var(--es-radius-full);
            border: 1px solid var(--es-gray-200);
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 24px;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tabs .nav-link {
            padding: 8px 18px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--es-text-muted);
            border: 0;
            background: transparent;
            border-radius: var(--es-radius-full);
            white-space: nowrap;
            transition: all var(--es-transition);
            cursor: pointer;
        }
        .category-tabs .nav-link:hover { color: var(--es-dark); background: var(--es-gray-100); }
        .category-tabs .nav-link.active {
            background: var(--es-dark) !important;
            color: var(--es-white) !important;
            border-color: transparent !important;
        }

        /* Sub filters (generated by JS) */
        #sub-filter-container .badge-filter {
            padding: 6px 14px;
            background: var(--es-gray-100);
            color: var(--es-gray-700);
            border-radius: var(--es-radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border: 0;
            transition: all var(--es-transition);
        }
        #sub-filter-container .badge-filter.active,
        #sub-filter-container .badge-filter:hover {
            background: var(--es-primary);
            color: var(--es-dark);
        }

        /* Filter toggle mobile */
        .filter-toggle-btn { width: 100%; }

        @media (max-width: 767px) {
            .filter-sidebar { position: static; margin-bottom: 20px; }
        }

        /* Products grid cards */
        .product-item {
            background: var(--es-surface);
            border: 1px solid var(--es-gray-200);
            border-radius: var(--es-radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all var(--es-transition);
            height: 100%;
            cursor: pointer;
        }
        .product-item:hover {
            border-color: var(--es-primary);
            box-shadow: var(--es-shadow-lg);
            transform: translateY(-3px);
        }
        .product-item figure {
            margin: 0;
            aspect-ratio: 4/3;
            background: var(--es-gray-50);
            padding: 20px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .product-item figure img {
            max-width: 100%; max-height: 100%;
            width: auto; height: auto;
            object-fit: contain;
            transition: transform var(--es-transition-slow);
        }
        .product-item:hover figure img { transform: scale(1.06); }

        .product-item .product-info {
            padding: 14px 16px 16px;
            display: flex; flex-direction: column; gap: 8px;
            flex: 1;
        }
        .product-item .product-title {
            font-family: var(--es-font-heading);
            font-size: 0.9375rem;
            font-weight: 700;
            line-height: 1.3;
            margin: 0;
            color: var(--es-dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.4em;
        }

        .product-item .product-meta {
            display: flex; align-items: center; gap: 12px;
            font-size: 0.75rem;
            color: var(--es-text-muted);
        }
        .product-item .product-rating i { color: var(--es-primary); margin-right: 3px; }
        .product-item .product-shops-count { display: inline-flex; align-items: center; gap: 3px; }
        .product-item .product-shops-count i { font-size: 10px; }

        .product-item .product-stores {
            display: flex; flex-wrap: wrap; gap: 4px;
            min-height: 22px;
        }

        .product-item .product-price-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--es-gray-100);
        }
        .product-item .product-price-label {
            display: block;
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--es-text-muted);
            margin-bottom: 2px;
        }
        .product-item .product-price {
            font-family: var(--es-font-heading);
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--es-dark);
            line-height: 1;
        }
        .product-item .product-cta {
            width: 36px; height: 36px;
            background: var(--es-primary);
            color: var(--es-dark);
            border: 0;
            border-radius: var(--es-radius-full);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all var(--es-transition);
            flex-shrink: 0;
        }
        .product-item:hover .product-cta {
            background: var(--es-dark);
            color: var(--es-primary);
            transform: translateX(2px);
        }

        .product-item .product-discount-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--es-danger);
            color: var(--es-white);
            font-size: 0.6875rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: var(--es-radius-full);
            z-index: 2;
            letter-spacing: 0.02em;
        }

        /* Badges das lojas (override para o badge ter tamanho correto no card) */
        .product-item .es-badge {
            font-size: 0.6875rem;
            padding: 2px 8px;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div id="es-header-slot"></div>

<div class="page-header">
    <div class="container">
        <h1>Todos os produtos</h1>
        <p>Compara preços em tempo real nas melhores lojas portuguesas</p>
    </div>
</div>

<section class="es-section-sm">
    <div class="container">
        <div class="row g-4">
            <!-- Filter sidebar -->
            <aside class="col-lg-3 col-md-4">
                <button class="es-btn es-btn-outline filter-toggle-btn d-md-none mb-3"
                        data-bs-toggle="collapse" data-bs-target="#filterSidebar"
                        aria-expanded="false" aria-controls="filterSidebar">
                    <i class="fa-solid fa-sliders"></i> Filtros
                </button>

                <div class="filter-sidebar collapse d-md-block" id="filterSidebar">
                    <h3>
                        <span>Filtros</span>
                        <button class="es-btn es-btn-ghost es-btn-sm" onclick="location.reload()" title="Limpar">
                            <i class="fa-solid fa-rotate-left"></i>
                        </button>
                    </h3>

                    <!-- Preço -->
                    <div class="filter-group">
                        <div class="filter-group-title">Preço</div>
                        <label class="es-label">Até <span id="priceValue">2000</span>€</label>
                        <input type="range" class="form-range" id="filter-price"
                               min="0" max="2000" step="50" value="2000"
                               oninput="document.getElementById('priceValue').innerText = this.value">
                        <div class="filter-range-labels">
                            <span>0€</span>
                            <span>2000€</span>
                        </div>
                    </div>

                    <!-- Lojas -->
                    <div class="filter-group">
                        <div class="filter-group-title">Loja</div>
                        <label class="filter-option">
                            <input type="checkbox" class="store-filter" value="worten"> Worten
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="store-filter" value="fnac"> Fnac
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="store-filter" value="radiopopular"> Rádio Popular
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" class="store-filter" value="pcdiga"> PC Diga
                        </label>
                    </div>

                    <!-- Destaques -->
                    <div class="filter-group">
                        <div class="filter-group-title">Destaques</div>
                        <label class="filter-option">
                            <input type="checkbox"> Em promoção
                        </label>
                        <label class="filter-option">
                            <input type="checkbox"> Entrega grátis
                        </label>
                    </div>
                </div>
            </aside>

            <!-- Grid -->
            <div class="col-lg-9 col-md-8">
                <!-- Category tabs -->
                <nav>
                    <div class="category-tabs" id="nav-tab" role="tablist">
                        <button class="nav-link active" id="nav-all-tab" data-bs-toggle="tab" data-bs-target="#nav-all" type="button" role="tab">Todos</button>
                        <button class="nav-link" id="nav-eletrodomesticos-tab" data-bs-toggle="tab" data-bs-target="#nav-eletrodomesticos" type="button" role="tab">Eletrodomésticos</button>
                        <button class="nav-link" id="nav-informatica-tab" data-bs-toggle="tab" data-bs-target="#nav-informatica" type="button" role="tab">Informática</button>
                        <button class="nav-link" id="nav-smartphones-tab" data-bs-toggle="tab" data-bs-target="#nav-smartphones" type="button" role="tab">Smartphones</button>
                        <button class="nav-link" id="nav-imagem-tab" data-bs-toggle="tab" data-bs-target="#nav-imagem" type="button" role="tab">Imagem e Som</button>
                        <button class="nav-link" id="nav-gaming-tab" data-bs-toggle="tab" data-bs-target="#nav-jogos" type="button" role="tab">Gaming</button>
                        <button class="nav-link" id="nav-outros-tab" data-bs-toggle="tab" data-bs-target="#nav-outros" type="button" role="tab">Outros</button>
                    </div>
                </nav>

                <!-- Subfiltros gerados por JS -->
                <div id="sub-filter-container" class="d-flex flex-wrap gap-2 mb-3"></div>

                <!-- Tab content -->
                <div class="tab-content" id="nav-tabContent">
                    <div class="tab-pane fade show active" id="nav-all" role="tabpanel">
                        <div id="grid-all" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3"></div>
                    </div>
                    <div class="tab-pane fade" id="nav-eletrodomesticos" role="tabpanel">
                        <div id="grid-eletrodomesticos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3"></div>
                    </div>
                    <div class="tab-pane fade" id="nav-informatica" role="tabpanel">
                        <div id="grid-informatica" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3"></div>
                    </div>
                    <div class="tab-pane fade" id="nav-smartphones" role="tabpanel">
                        <div id="grid-smartphones" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3"></div>
                    </div>
                    <div class="tab-pane fade" id="nav-imagem" role="tabpanel">
                        <div id="grid-imagem" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3"></div>
                    </div>
                    <div class="tab-pane fade" id="nav-jogos" role="tabpanel">
                        <div id="grid-jogos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3"></div>
                    </div>
                    <div class="tab-pane fade" id="nav-outros" role="tabpanel">
                        <div id="grid-outros" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div id="es-footer-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/ui-layout.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/favorites.js"></script>
<script src="js/products.js"></script>
</body>
</html>
