<!DOCTYPE html>
<html lang="pt">
<head>
    <title>O meu perfil — EletroSync</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/design-system.css">

    <style>
        .profile-hero {
            background: linear-gradient(135deg, var(--es-primary-subtle) 0%, var(--es-primary-light) 100%);
            padding: 40px 0;
            border-bottom: 1px solid var(--es-gray-200);
        }
        .profile-hero-inner { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .profile-avatar {
            width: 80px; height: 80px;
            background: var(--es-white);
            border-radius: var(--es-radius-full);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: var(--es-primary);
            box-shadow: var(--es-shadow-md);
            flex-shrink: 0;
        }
        .profile-hero h1 { margin: 0 0 4px; font-size: 1.75rem; }
        .profile-hero p { margin: 0; color: var(--es-text-muted); }

        .profile-menu {
            list-style: none; padding: 0; margin: 0;
            background: var(--es-white);
            border: 1px solid var(--es-gray-200);
            border-radius: var(--es-radius-lg);
            overflow: hidden;
        }
        .profile-menu li { border-bottom: 1px solid var(--es-gray-100); }
        .profile-menu li:last-child { border-bottom: 0; }
        .profile-menu a {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px;
            color: var(--es-text);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: all var(--es-transition);
        }
        .profile-menu a:hover { background: var(--es-gray-50); color: var(--es-dark); }
        .profile-menu a i.fa-solid:first-child { width: 20px; color: var(--es-text-muted); }
        .profile-menu a:hover i.fa-solid:first-child { color: var(--es-primary); }
        .profile-menu li.active a { background: var(--es-primary-subtle); color: var(--es-dark); font-weight: 600; }
        .profile-menu li.active a i:first-child { color: var(--es-primary); }
        .profile-menu .chevron { margin-left: auto; color: var(--es-gray-400); font-size: 12px; }
        .profile-menu .soon {
            margin-left: auto;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            padding: 3px 8px; border-radius: var(--es-radius-full);
            background: var(--es-gray-100); color: var(--es-gray-600);
            letter-spacing: 0.04em;
        }
        .profile-menu a.disabled-link { opacity: .55; cursor: not-allowed; }
        .profile-menu a.disabled-link:hover { background: transparent; }
        .profile-menu a.logout { color: var(--es-danger); }
        .profile-menu a.logout i:first-child { color: var(--es-danger); }

        .data-card {
            background: var(--es-white);
            border: 1px solid var(--es-gray-200);
            border-radius: var(--es-radius-lg);
            padding: 24px;
            margin-bottom: 16px;
        }
        .data-card h3 { font-size: 1.125rem; margin: 0 0 20px; display: flex; align-items: center; gap: 10px; }
        .data-card h3 i { color: var(--es-primary); }

        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (max-width: 576px) { .data-grid { grid-template-columns: 1fr; } }
        .data-item label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--es-text-muted);
            margin-bottom: 4px;
        }
        .data-item .value { font-size: 0.9375rem; font-weight: 600; color: var(--es-dark); word-break: break-word; }

        .stat-card {
            display: flex; align-items: center; gap: 16px;
            background: var(--es-white);
            border: 1px solid var(--es-gray-200);
            border-radius: var(--es-radius-lg);
            padding: 20px;
            transition: all var(--es-transition);
            text-decoration: none;
            color: inherit;
            height: 100%;
        }
        .stat-card:hover { border-color: var(--es-primary); transform: translateY(-2px); box-shadow: var(--es-shadow-md); color: inherit; }
        .stat-card.disabled { opacity: .6; cursor: default; }
        .stat-card.disabled:hover { border-color: var(--es-gray-200); transform: none; box-shadow: none; }
        .stat-card-icon {
            width: 48px; height: 48px; flex-shrink: 0;
            background: var(--es-primary-subtle);
            border-radius: var(--es-radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: var(--es-primary);
        }
        .stat-card.disabled .stat-card-icon { background: var(--es-gray-100); color: var(--es-gray-500); }
        .stat-card h4 { font-size: 0.9375rem; margin: 0 0 2px; }
        .stat-card .stat-value { font-family: var(--es-font-heading); font-size: 1.25rem; font-weight: 800; color: var(--es-dark); }
    </style>
</head>
<body>

<div id="es-header-slot"></div>

<!-- Hero -->
<section class="profile-hero">
    <div class="container">
        <div class="profile-hero-inner">
            <div class="profile-avatar"><i class="fa-solid fa-user"></i></div>
            <div>
                <h1 id="profile-user-name">Olá!</h1>
                <p>Gere a tua conta, favoritos e atividade.</p>
            </div>
        </div>
    </div>
</section>

<main class="es-section-sm">
    <div class="container">
        <div class="row g-4">
            <!-- Menu lateral -->
            <aside class="col-lg-4 col-xl-3">
                <ul class="profile-menu">
                    <li class="active">
                        <a href="#"><i class="fa-solid fa-user"></i> Conta <i class="fa-solid fa-chevron-right chevron"></i></a>
                    </li>
                    <li>
                        <a href="favorites.html"><i class="fa-solid fa-heart"></i> Favoritos <i class="fa-solid fa-chevron-right chevron"></i></a>
                    </li>
                    <li>
                        <a href="#" class="disabled-link"><i class="fa-solid fa-bell"></i> Alertas de Preço <span class="soon">Em breve</span></a>
                    </li>
                    <li>
                        <a href="#" class="disabled-link"><i class="fa-solid fa-location-dot"></i> Moradas <span class="soon">Em breve</span></a>
                    </li>
                    <li>
                        <a href="#" class="disabled-link"><i class="fa-solid fa-gear"></i> Configurações <span class="soon">Em breve</span></a>
                    </li>
                    <li>
                        <a href="#" onclick="handleLogout(); return false;" class="logout"><i class="fa-solid fa-right-from-bracket"></i> Terminar sessão</a>
                    </li>
                </ul>
            </aside>

            <!-- Conteúdo -->
            <div class="col-lg-8 col-xl-9">
                <div class="data-card">
                    <h3><i class="fa-solid fa-id-card"></i> Dados pessoais</h3>
                    <div class="data-grid">
                        <div class="data-item">
                            <label>Nome</label>
                            <div class="value" id="profile-data-name">—</div>
                        </div>
                        <div class="data-item">
                            <label>Email</label>
                            <div class="value" id="profile-data-email">—</div>
                        </div>
                        <div class="data-item">
                            <label>Conta criada em</label>
                            <div class="value" id="profile-data-created">—</div>
                        </div>
                        <div class="data-item">
                            <label>Último login</label>
                            <div class="value" id="profile-data-last-login">—</div>
                        </div>
                    </div>
                    <hr class="es-divider">
                    <button class="es-btn es-btn-outline" disabled title="Em breve">
                        <i class="fa-solid fa-pen"></i> Editar dados
                    </button>
                </div>

                <h3 style="font-size:1rem;margin:24px 0 12px;color:var(--es-gray-700);text-transform:uppercase;letter-spacing:.04em;">Atividade</h3>

                <div class="row g-3">
                    <div class="col-sm-6">
                        <a href="favorites.html" class="stat-card">
                            <div class="stat-card-icon"><i class="fa-solid fa-heart"></i></div>
                            <div>
                                <h4>Favoritos</h4>
                                <div class="stat-value"><span id="profile-favorites-count">—</span> <small style="font-size:.75rem;font-weight:500;color:var(--es-text-muted);">produtos</small></div>
                            </div>
                        </a>
                    </div>
                    <div class="col-sm-6">
                        <div class="stat-card disabled">
                            <div class="stat-card-icon"><i class="fa-solid fa-bell"></i></div>
                            <div>
                                <h4>Alertas de Preço</h4>
                                <div class="stat-value"><small style="font-size:.75rem;font-weight:500;color:var(--es-text-muted);">Em breve</small></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="product.html" class="es-btn es-btn-primary es-btn-lg">
                        <i class="fa-solid fa-bag-shopping"></i> Explorar Produtos
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="es-footer-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/ui-layout.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
