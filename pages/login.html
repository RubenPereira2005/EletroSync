<!DOCTYPE html>
<html lang="pt">

<head>
  <title>EletroSync - Login</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="css/vendor.css">
  <link rel="stylesheet" type="text/css" href="css/style.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .glass-auth-container {
      max-width: 450px;
      margin: 60px auto;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
      border: 1px solid #ced4da;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
      border-color: #8fb3fb;
    }
  </style>
</head>

<body>

  <header class="py-3 bg-white shadow-sm" style="background: rgba(255,255,255,0.9); backdrop-filter: blur(5px);">
    <div class="container d-flex justify-content-center">
      <a href="index.html">
        <img src="images/logo3.png" alt="logo" class="img-fluid" style="height: 50px;">
      </a>
    </div>
  </header>

  <section class="py-5 flex-grow-1 d-flex align-items-center">
    <div class="container">
      <div class="glass-auth-container">
        <h3 class="text-center mb-2 fw-bold">Bem-vindo de volta!</h3>
        <p class="text-muted text-center mb-4">Inicie sessão para aceder à sua conta EletroSync.</p>
        
        <form id="login-form">
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="email" required placeholder="exemplo@email.com">
          </div>
          
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" id="password" required placeholder="A sua palavra-passe">
          </div>
          
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm" id="login-btn">Entrar na Conta</button>
          </div>
          
          <div class="text-center mt-4">
            Ainda não tem conta? <a href="register.html" class="text-primary text-decoration-none fw-bold">Registe-se aqui</a>.
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
