<!DOCTYPE html>
<html lang="pt">
<head>
    <title>Iniciar sessão — EletroSync</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="stylesheet" type="text/css" href="css/design-system.css">

    <style>
        body {
            min-height: 100vh;
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, var(--es-primary-subtle) 0%, var(--es-primary-light) 100%);
        }
        .auth-header {
            padding: 24px 0;
            text-align: center;
        }
        .auth-header img { height: 44px; }

        .auth-main { flex: 1; display: flex; align-items: center; padding: 24px 0; }

        .auth-card {
            background: var(--es-white);
            border-radius: var(--es-radius-xl);
            box-shadow: var(--es-shadow-xl);
            padding: 40px;
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
        }
        .auth-card h1 { font-size: 1.5rem; margin: 0 0 8px; text-align: center; }
        .auth-card .subtitle { color: var(--es-text-muted); text-align: center; margin-bottom: 32px; font-size: 0.9375rem; }

        .auth-card .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--es-gray-700);
            margin-bottom: 6px;
        }
        .auth-card .form-control {
            padding: 12px 16px;
            font-size: 0.9375rem;
            border: 1.5px solid var(--es-gray-300);
            border-radius: var(--es-radius-md);
            transition: all var(--es-transition);
        }
        .auth-card .form-control:focus {
            border-color: var(--es-primary);
            box-shadow: var(--es-shadow-focus);
        }

        .auth-card .form-check-input:checked {
            background-color: var(--es-primary);
            border-color: var(--es-primary);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.875rem;
            color: var(--es-text-muted);
        }
        .auth-footer a { color: var(--es-primary); font-weight: 700; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .auth-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>

<header class="auth-header">
    <a href="index.html"><img src="images/logo3.png" alt="EletroSync"></a>
</header>

<main class="auth-main">
    <div class="container">
        <div class="auth-card">
            <h1>Bem-vindo de volta</h1>
            <p class="subtitle">Inicia sessão para aceder à tua conta EletroSync.</p>

            <form id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required placeholder="exemplo@email.com">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Palavra-passe</label>
                    <input type="password" class="form-control" id="password" required placeholder="A tua palavra-passe">
                </div>

                <div class="mb-4 form-check d-flex align-items-center gap-2 ps-0">
                    <input type="checkbox" class="form-check-input m-0" id="remember-me">
                    <label class="form-check-label text-muted m-0 small" for="remember-me">Manter-me ligado</label>
                </div>

                <button type="submit" class="es-btn es-btn-primary es-btn-lg w-100" id="login-btn">
                    Entrar na Conta
                </button>
            </form>

            <p class="auth-footer">
                Ainda não tens conta? <a href="register.html">Regista-te aqui</a>
            </p>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
