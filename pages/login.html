<!DOCTYPE html>
<html lang="pt">

<head>
  <title>EletroSync - Login</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="css/vendor.css">
  <link rel="stylesheet" type="text/css" href="css/style.css">
  
</head>

<body class="auth-body">

  <header class="py-3 bg-white shadow-sm" style="background: rgba(255,255,255,0.9); backdrop-filter: blur(5px);">
    <div class="container d-flex justify-content-center">
      <a href="index.html">
        <img src="images/logo3.png" alt="logo" class="img-fluid" style="height: 50px;">
      </a>
    </div>
  </header>

  <section class="py-5 flex-grow-1 d-flex align-items-center">
    <div class="container">
      <div class="glass-auth-container">
        <h3 class="text-center mb-2 fw-bold">Bem-vindo de volta!</h3>
        <p class="text-muted text-center mb-4">Inicie sessão para aceder à sua conta EletroSync.</p>
        
        <form id="login-form">
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="email" required placeholder="exemplo@email.com">
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Palavra-passe</label>
            <input type="password" class="form-control" id="password" required placeholder="A sua palavra-passe">
          </div>

          <div class="mb-4 form-check d-flex align-items-center gap-2" style="padding-left: 0;">
            <input type="checkbox" class="form-check-input m-0" id="remember-me">
            <label class="form-check-label text-muted m-0" for="remember-me" style="transform: translateY(1px);">Lembrar-me</label>
          </div>
          
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm" id="login-btn">Entrar na Conta</button>
          </div>
          
          <div class="text-center mt-4">
            Ainda não tem conta? <a href="register.html" class="text-primary text-decoration-none fw-bold">Registe-se aqui</a>.
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
